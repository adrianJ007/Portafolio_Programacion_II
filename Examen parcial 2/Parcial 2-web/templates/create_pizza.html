{% extends "base.html" %}
{% block title %}Nueva Pizza{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h2><i class="fas fa-pizza-slice"></i> Crear Nueva Pizza</h2>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Pizza</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio (USD)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ingredientes (separados por coma)</label>
                        <input type="text" name="ingredientes" class="form-control" placeholder="Ej: Queso,Tomate,Pepperoni">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagen de la Pizza</label>
                        <input type="file" name="imagen" class="form-control" accept="image/png, image/jpeg, image/jpg, image/webp, image/gif">
                        <small class="text-muted">Formatos permitidos: PNG, JPG, JPEG, WEBP, GIF. Tamaño máximo: 5MB</small>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Pizza</button>
                    <a href="{{ url_for('listar_pizzas') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
