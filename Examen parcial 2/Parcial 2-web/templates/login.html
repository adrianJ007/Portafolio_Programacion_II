{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card" style="margin-top: 50px;">
            <div class="card-header bg-primary text-white text-center">
                <h2><i class="fas fa-pizza-slice"></i> Chinos Café</h2>
                <p>Inicia sesión para continuar</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control" required placeholder="tucorreo@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required placeholder="Tu contraseña">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
                </form>
                <p class="text-center mt-3">
                    ¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
