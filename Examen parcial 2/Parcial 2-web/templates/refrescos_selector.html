{% extends "base.html" %}
{% block title %}Elige tus Refrescos{% endblock %}
{% block content %}
<h2 class="text-center mb-4"><i class="fas fa-wine-bottle"></i> Elige tus Refrescos</h2>

<form method="POST" action="{{ url_for('agregar_refrescos_al_pedido') }}">
    <div class="row">
        {% for ref in refrescos %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 text-center">
                <!-- MOSTRAR IMAGEN -->
                {% if ref.imagen %}
                <img src="{{ url_for('static', filename='img/refrescos/' + ref.imagen) }}" 
                    alt="{{ ref.nombre }}" 
                    style="height: 150px; object-fit: contain; padding: 15px;"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 150px; display: none;">
                    <i class="fas fa-wine-bottle fa-3x text-secondary"></i>
                </div>
                {% else %}
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 150px;">
                    <i class="fas fa-wine-bottle fa-3x text-secondary"></i>
                </div>
                {% endif %}
                
                <div class="card-header">
                    <strong>{{ ref.nombre }}</strong>
                </div>
                <div class="card-body">
                    <h4 class="text-primary">${{ "%.2f"|format(ref.precio) }}</h4>
                    <div class="input-group mt-3" style="max-width: 150px; margin: 0 auto;">
                        <button class="btn btn-outline-secondary" type="button" onclick="cambiarCantidad('ref_{{ ref.id }}', -1)">-</button>
                        <input type="number" name="cantidad_{{ ref.id }}" value="0" min="0" max="10" id="ref_{{ ref.id }}" class="form-control text-center" step="1" style="max-width: 60px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="cambiarCantidad('ref_{{ ref.id }}', 1)">+</button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="text-center mt-4">
        <button type="submit" class="btn btn-primary btn-lg">
            <i class="fas fa-check"></i> Agregar al pedido
        </button>
        <a href="{{ url_for('realizar_pedido') }}" class="btn btn-secondary btn-lg">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>
</form>

<script>
function cambiarCantidad(id, delta) {
    const input = document.getElementById(id);
    let valor = parseInt(input.value) + delta;
    if (valor < 0) valor = 0;
    if (valor > 10) valor = 10;
    input.value = valor;
}
</script>
{% endblock %}
