{% extends "base.html" %}
{% block title %}Nuevo Refresco{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h2><i class="fas fa-wine-bottle"></i> Nuevo Refresco</h2>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Refresco</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio (USD)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagen del Refresco</label>
                        <input type="file" name="imagen" class="form-control" accept="image/png, image/jpeg, image/jpg, image/webp, image/gif">
                        <small class="text-muted">Formatos: PNG, JPG, JPEG, WEBP, GIF. Máximo 5MB</small>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Refresco</button>
                    <a href="{{ url_for('listar_refrescos') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
