{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm mb-3">🏠 Volver al inicio</a>
<h2>Empresas locales</h2>
<a href="{{ url_for('create_company') }}" class="btn btn-primary mb-3">+ Nueva empresa</a>
<table class="table table-striped">
    <thead>
        <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr>
    </thead>
    <tbody>
        {% for comp in companies %}
        <tr>
            <td>{{ comp.id }}</td>
            <td>{{ comp.name }}</td>
            <td>{{ comp.email }}</td>
            <td>{{ comp.phone }}</td>
            <td>
                <a href="{{ url_for('edit_company', id=comp.id) }}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{{ url_for('delete_company', id=comp.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar empresa? Se borrarán sus combos.')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
