{% extends "base.html" %}
{% block title %}Menú principal{% endblock %}
{% block content %}
<h1 class="app-page-title display-6 mb-4">Menú</h1>
<div class="row g-4 app-menu-grid justify-content-center">
  <div class="col-12 col-sm-6 col-lg-4">
    <a href="{{ url_for('listar_asignaciones') }}" class="app-menu-tile-link">
      <div class="card app-card app-menu-tile h-100 border-0 text-center">
        <div class="app-card-accent"></div>
        <div class="card-body py-5 px-3 d-flex flex-column align-items-center justify-content-center">
          <i class="bi bi-brush app-menu-tile-icon" aria-hidden="true"></i>
          <span class="app-menu-tile-label">Aseo</span>
        </div>
      </div>
    </a>
  </div>
  <div class="col-12 col-sm-6 col-lg-4">
    <a href="{{ url_for('simulacion') }}" class="app-menu-tile-link">
      <div class="card app-card app-menu-tile h-100 border-0 text-center">
        <div class="app-card-accent"></div>
        <div class="card-body py-5 px-3 d-flex flex-column align-items-center justify-content-center">
          <i class="bi bi-cpu app-menu-tile-icon" aria-hidden="true"></i>
          <span class="app-menu-tile-label">Simulación</span>
        </div>
      </div>
    </a>
  </div>
  <div class="col-12 col-sm-6 col-lg-4">
    <a href="{{ url_for('listar_gastos') }}" class="app-menu-tile-link">
      <div class="card app-card app-menu-tile h-100 border-0 text-center">
        <div class="app-card-accent"></div>
        <div class="card-body py-5 px-3 d-flex flex-column align-items-center justify-content-center">
          <i class="bi bi-wallet2 app-menu-tile-icon" aria-hidden="true"></i>
          <span class="app-menu-tile-label">Gastos</span>
        </div>
      </div>
    </a>
  </div>
</div>
{% endblock %}
