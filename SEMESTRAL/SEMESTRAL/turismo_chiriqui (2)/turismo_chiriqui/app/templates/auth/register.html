{% extends 'base.html' %}{% block content %}<section class="auth"><div class="auth-story"><span class="eyebrow">Nuevo viajero</span><h1>Tu próxima historia empieza aquí.</h1><p>Completa tu perfil para recibir reservas, comprobantes y recordatorios.</p></div><form method="post" class="glass form registration"><h2>Crear cuenta</h2><div class="form-columns"><label>Nombre completo<input name="name" required></label><label>Cédula opcional<input name="identity"></label><label>Usuario<input name="username" required></label><label>Correo<input name="email" type="email" required></label><label>Teléfono<input name="phone" required></label><label>Fecha de nacimiento opcional<input name="birth_date" type="date"></label><label>Dirección opcional<input name="address"></label><label>Contacto de emergencia opcional<input name="emergency_contact"></label><label>Contraseña<input name="password" type="password" minlength="8" required></label><label>Confirmar contraseña<input name="password_confirm" type="password" minlength="8" required></label></div><label class="terms-check"><input type="checkbox" required> Acepto los términos y condiciones.</label><button class="btn primary">Crear cuenta y verificar correo</button></form></section>{% endblock %}
