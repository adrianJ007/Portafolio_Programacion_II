{% extends 'base.html' %}
{% block content %}
<section class="auth">
  <div>
    <span class="eyebrow">Experiencia finalizada</span>
    <h1>Cuéntanos cómo fue tu gira</h1>
    <p>Tu evaluación ayuda a mejorar guías, itinerarios, proveedores y atención.</p>
    <div class="glass info">
      <h2>{{reservation.tour_name}}</h2>
      <p>{{reservation.date}} · {{reservation.route_name}}</p>
    </div>
  </div>
  <form method="post" class="form glass">
    <h2>Evaluación del cliente</h2>
    <label>Calificación general<select name="general_rating" required><option value="5">5 - Excelente</option><option value="4">4 - Muy buena</option><option value="3">3 - Buena</option><option value="2">2 - Regular</option><option value="1">1 - Mala</option></select></label>
    <label>Calificación del guía<select name="guide_rating" required><option value="5">5 - Excelente</option><option value="4">4 - Muy buena</option><option value="3">3 - Buena</option><option value="2">2 - Regular</option><option value="1">1 - Mala</option></select></label>
    <label>Calificación del itinerario<select name="itinerary_rating" required><option value="5">5 - Excelente</option><option value="4">4 - Muy bueno</option><option value="3">3 - Bueno</option><option value="2">2 - Regular</option><option value="1">1 - Malo</option></select></label>
    <label>Comentarios<textarea name="comments" rows="4" placeholder="¿Qué fue lo mejor?"></textarea></label>
    <label>Sugerencias<textarea name="suggestions" rows="3" placeholder="¿Qué podemos mejorar?"></textarea></label>
    <button class="btn primary">Enviar evaluación</button>
  </form>
</section>
{% endblock %}
