<button class="chat-toggle" id="chatToggle" aria-label="Abrir asistente">✦</button>
<aside class="chat glass" id="chat" aria-live="polite">
  <header><b><span class="assistant-avatar"></span> Chiriquí Assistant</b><button id="chatClose" type="button">×</button></header>
  <div id="chatMessages" class="chat-messages"><p class="bot">¡Hola! Pregúntame sobre tours, Yappy, horarios, reservas o qué llevar.</p></div>
  <form id="chatForm"><input id="chatInput" placeholder="Escribe tu pregunta" autocomplete="off"><button>Enviar</button></form>
</aside>
